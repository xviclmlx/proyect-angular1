<div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div style="width:370px; display:flex; flex-direction:column; gap:1rem; padding:2rem; border:1px solid #ddd; border-radius:12px;">
    
    <h2 style="text-align:center;">Iniciar Sesión</h2>

    @if (errorMsg) {
      <p-message severity="error" [text]="errorMsg" />
    }

    <input pInputText [(ngModel)]="email" placeholder="Correo electrónico" style="width:100%" />

    <div style="position:relative;">
      <input 
        pInputText 
        [type]="showPassword ? 'text' : 'password'" 
        [(ngModel)]="password" 
        placeholder="Contraseña" 
        style="width:100%; padding-right:2.5rem;" 
      />
      <i 
        [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"
        (click)="showPassword = !showPassword"
        style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; color:#888;">
      </i>
    </div>

    <div>
      <p-button label="Entrar" icon="" (onClick)="login()" styleClass="w-full" />
    </div>
    <div>
      <p-button label="Regresar" icon="" severity="secondary" routerLink="/" />
    </div>

    <p style="text-align:center;">¿No tienes cuenta? <a routerLink="/register">Regístrate</a></p>
  </div>
</div>
