<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">
        <i class="pi pi-briefcase"></i>
      </div>
      <h2>ERP System</h2>
      <p class="login-subtitle">Sistema de Gestión Empresarial</p>
    </div>

    @if (errorMsg) {
      <p-message severity="error" [text]="errorMsg" styleClass="w-full" />
    }

    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          id="email"
          pInputText
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="usuario@ejemplo.com"
          [disabled]="cargando"
          class="w-full"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            id="password"
            pInputText
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingresa tu contraseña"
            [disabled]="cargando"
            class="w-full"
          />
          <button
            type="button"
            class="btn-toggle-password"
            (click)="showPassword = !showPassword"
            [disabled]="cargando"
          >
            <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
          </button>
        </div>
      </div>

      <p-button
        label="Entrar"
        icon="pi pi-sign-in"
        [loading]="cargando"
        [disabled]="cargando || !email || !password"
        type="submit"
        styleClass="w-full p-button-lg"
      />
    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
      <p><a routerLink="/">← Volver al inicio</a></p>
    </div>

    <div class="demo-credentials">
      <p class="demo-title">📝 Credenciales de Prueba:</p>
      <div class="demo-item">
        <strong>Admin:</strong> vic@gmail.com / 1234
      </div>
      <div class="demo-item">
        <strong>Usuario:</strong> emmamar@gmail.com / Emma@12345
      </div>
    </div>
  </div>
</div>
