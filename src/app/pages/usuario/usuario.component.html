<p-toast />
<p-confirmDialog />

<div class="page">
  <h2><i class="pi pi-user"></i> Mi Perfil</h2>

  <div class="perfil-container">
    <p-card>
      <div class="perfil-header">
        <p-avatar [label]="avatarLabel" size="xlarge" shape="circle" />
        <div>
          <h3>{{ perfil.nombre }}</h3>
          <span class="username">@{{ perfil.usuario }}</span>
          <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap">
            <p-tag [value]="perfil.rol" severity="success" />
          </div>
        </div>
      </div>

      <p-divider />

      <div class="perfil-datos">
        <div class="dato">
          <i class="pi pi-envelope"></i>
          <div>
            <span class="label">Correo electrónico</span>
            <span>{{ perfil.email }}</span>
          </div>
        </div>

        <div class="dato">
          <i class="pi pi-phone"></i>
          <div>
            <span class="label">Teléfono</span>
            <span>{{ perfil.telefono }}</span>
          </div>
        </div>

        <div class="dato">
          <i class="pi pi-map-marker"></i>
          <div>
            <span class="label">Dirección</span>
            <span>{{ perfil.direccion }}</span>
          </div>
        </div>

        <div class="dato">
          <i class="pi pi-calendar"></i>
          <div>
            <span class="label">Fecha de nacimiento</span>
            <span>{{ perfil.fechaNacimiento }} — {{ edad }} años</span>
          </div>
        </div>

        <div class="dato">
          <i class="pi pi-lock"></i>
          <div>
            <span class="label">Contraseña</span>
            <span>••••••••••</span>
          </div>
        </div>
      </div>

      <p-divider />

      <div style="display: flex; gap: 1rem; flex-wrap: wrap">
        <ng-container *ifHasPermission="'usuario.editar'">
          <p-button
            label="Editar perfil"
            icon="pi pi-pencil"
            severity="info"
            (onClick)="abrirEdicion()"
          />
        </ng-container>

        <ng-container *ifHasPermission="'usuario.eliminar'">
          <p-button
            label="Eliminar cuenta"
            icon="pi pi-trash"
            severity="danger"
            (onClick)="eliminarCuenta()"
          />
        </ng-container>
      </div>
    </p-card>
  </div>

  <!-- 🔥 MODAL -->
  <p-dialog
    [(visible)]="dialogVisible"
    header="Editar Perfil"
    [modal]="true"
    [style]="{ width: '420px' }"
  >
    <div style="display: flex; flex-direction: column; gap: 1rem; padding: 0.5rem 0">

      <!-- NOMBRE -->
      <input
        pInputText
        [(ngModel)]="perfilEdicion.nombre"
        placeholder="Nombre completo"
        style="width: 100%"
      />

      <!-- EMAIL -->
      <input
        pInputText
        [(ngModel)]="perfilEdicion.email"
        placeholder="Email"
        style="width: 100%"
      />
      <p-message
        *ngIf="perfilEdicion.email && !perfilEdicion.email.includes('@')"
        severity="error"
        text="El email debe contener @"
      />

      <!-- TELEFONO -->
      <input
        pInputText
        [(ngModel)]="perfilEdicion.telefono"
        placeholder="Teléfono (10 dígitos)"
        maxlength="10"
        (keypress)="soloNumeros($event)"
        style="width: 100%"
      />

      <!-- 🔥 CORREGIDO (SIN ?.length) -->
      <p-message
        *ngIf="perfilEdicion.telefono && perfilEdicion.telefono.length < 10"
        severity="warn"
        text="El teléfono debe tener 10 dígitos"
      />

      <!-- DIRECCION -->
      <input
        pInputText
        [(ngModel)]="perfilEdicion.direccion"
        placeholder="Dirección"
        style="width: 100%"
      />

      <!-- FECHA -->
      <input
        pInputText
        type="date"
        [(ngModel)]="perfilEdicion.fechaNacimiento"
        [max]="maxFechaNacimiento"
        style="width: 100%"
      />

      <p-message
        *ngIf="perfilEdicion.fechaNacimiento && perfilEdicion.fechaNacimiento > maxFechaNacimiento"
        severity="error"
        text="Debes ser mayor de 18 años"
      />

    </div>

    <ng-template pTemplate="footer">
      <p-button
        label="Cancelar"
        severity="secondary"
        (onClick)="dialogVisible = false"
      />
      <p-button
        label="Guardar"
        icon="pi pi-save"
        (onClick)="guardar()"
      />
    </ng-template>
  </p-dialog>
</div>
