<div class="sidebar" [class.collapsed]="!sidebarAbierto()">
  <!-- Header con Toggle -->
  <div class="sidebar-header">
    <div class="header-content">
      <div class="logo-container">
        <div class="logo">
          <i class="pi pi-briefcase"></i>
        </div>
        @if (sidebarAbierto()) {
          <span class="logo-text">ERP</span>
        }
      </div>
      <button class="btn-toggle" (click)="toggleSidebar()" title="Contraer/Expandir">
        <i [class]="sidebarAbierto() ? 'pi pi-chevron-left' : 'pi pi-chevron-right'"></i>
      </button>
    </div>
  </div>

  <!-- Información del Usuario -->
  <div class="user-info" *ngIf="sidebarAbierto()">
    <div class="user-avatar">{{ avatarUsuario() }}</div>
    <div class="user-details">
      <p class="user-name">{{ nombreUsuario() }}</p>
      <p class="user-role">Conectado</p>
    </div>
  </div>

  <!-- Navegación Principal -->
  <nav class="sidebar-nav">
    <div class="nav-section">
      <p class="section-title" *ngIf="sidebarAbierto()">Menú Principal</p>

      @for (item of menuItems; track item.ruta) {
        @if (tienePermiso(item.permisoRequerido)) {
          <a
            [routerLink]="item.ruta"
            routerLinkActive="active"
            class="nav-item"
            [title]="item.label"
          >
            <i [class]="'pi ' + item.icon"></i>
            @if (sidebarAbierto()) {
              <span class="nav-label">{{ item.label }}</span>
            }
          </a>
        }
      }
    </div>
  </nav>

  <!-- Footer con Cerrar Sesión -->
  <div class="sidebar-footer">
    <button
      #logoutBtn
      (click)="cerrarSesion($event)"
      class="btn-logout"
      [title]="sidebarAbierto() ? '' : 'Cerrar sesión'"
    >
      <i class="pi pi-sign-out"></i>
      @if (sidebarAbierto()) {
        <span>Cerrar sesión</span>
      }
    </button>
    @if (sidebarAbierto()) {
      <span class="version">v1.0.0</span>
    }
  </div>
</div>

<p-confirmDialog></p-confirmDialog>
